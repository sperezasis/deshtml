<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    Caseproof Documentation System — Presentation format skeleton.
    Verbatim from .planning/phases/03-remaining-four-doc-types/03-RESEARCH.md
    §"Code Examples → Verified Pattern: presentation.html skeleton (full)".
    Spike outcome (D3-03, plan 03-01 Task 1):
    Spike outcome: PASS — Chrome + Safari macOS scroll-snap verified 2026-04-28. All 7 test steps passed.
    Sister formats: handbook.html (sidebar+sticky), overview.html (linear, no sidebar),
    presentation.html (this file) — full-viewport slides, NO sidebar, NO sticky bar (D3-09),
    snap container scoped to <main> not <html> (Safari fragility — RESEARCH §Pattern 3).
    SKILL.md Step 6 inlines the three CSS files (D2-15); the <link> tags below are dev-time
    references that SKILL.md replaces at assembly time.
  -->
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title><!-- DOC TITLE --></title>
  <link rel="stylesheet" href="../palette.css">
  <link rel="stylesheet" href="../typography.css">
  <style>
    /* Presentation layout — full-viewport vertical slide deck.
       NO sidebar, NO sticky bar. Snap container scoped to <main>, not <html>,
       to avoid Safari's html-as-snap-container fragility. */
    html { scroll-padding-top: 0; }
    body { background: var(--white); margin: 0; }

    main.deck {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      height: 100vh;
      margin: 0;
      counter-reset: slide-num;
    }

    .slide {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 120px;
      box-sizing: border-box;
      counter-increment: slide-num;
      position: relative;
    }

    .slide-counter {
      position: absolute;
      bottom: 24px;
      right: 32px;
      font-size: 14px;
      font-weight: 700;
      color: var(--g6);
      letter-spacing: 1.2px;
    }
    .slide-counter::before {
      /* TOTAL_SLIDES_LITERAL is replaced by Claude at render time with the literal slide count. */
      content: counter(slide-num) " / TOTAL_SLIDES_LITERAL";
    }

    .slide-nav {
      position: fixed;
      top: 24px;
      right: 32px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }
  </style>
  <style>
    /* Slide-deck type scale. Rides on Inter @import from typography.css.
       Larger than the document scale because slides are read at distance. */
    .slide h1 {
      font-size: 80px;
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1.05;
    }
    .slide h2 {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.1;
    }
    .slide p,
    .slide li {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--g9);
    }
  </style>
</head>
<body>

<!-- SLIDE NAV: floating top-right anchor links to each slide. Reuses .nav-a from components.css. -->
<nav class="slide-nav">
  <!-- SLIDE NAV ITEMS SLOT -->
</nav>

<main class="deck">

  <!-- SLIDE 1..N: each section is a full-viewport slide with optional .slide-counter pill. -->
  <section class="slide" id="slide-1">
    <!-- SLIDE 1 H1 SLOT -->
    <!-- SLIDE 1 BODY SLOT (components from components.html allowlist) -->
    <div class="slide-counter"></div>
  </section>

</main>

</body>
</html>
